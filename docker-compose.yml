services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: knova
      MYSQL_USER: knova
      MYSQL_PASSWORD: knova123
      MYSQL_ROOT_PASSWORD: root123
    ports: ["3306:3306"]
    volumes: [mysql-data:/var/lib/mysql]
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment: [ETCD_AUTO_COMPACTION_MODE=revision,ETCD_AUTO_COMPACTION_RETENTION=1000,ETCD_QUOTA_BACKEND_BYTES=4294967296,ETCD_SNAPSHOT_COUNT=50000]
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes: [etcd-data:/etcd]
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment: {MINIO_ACCESS_KEY: minioadmin, MINIO_SECRET_KEY: minioadmin}
    command: minio server /minio_data --console-address ":9001"
    volumes: [minio-data:/minio_data]
  milvus:
    image: milvusdb/milvus:v2.5.27
    command: ["milvus", "run", "standalone"]
    security_opt: ["seccomp:unconfined"]
    environment: {ETCD_ENDPOINTS: etcd:2379, MINIO_ADDRESS: minio:9000}
    ports: ["19530:19530", "9091:9091"]
    volumes: [milvus-data:/var/lib/milvus]
    depends_on: [etcd,minio]
  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/knova?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: knova
      DB_PASSWORD: knova123
      MILVUS_HOST: milvus
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-knova_segments_bge_m3}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL:-deepseek-v4-pro}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-ollama}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-bge-m3}
      AI_EMBEDDING_DIMENSION: ${AI_EMBEDDING_DIMENSION:-1024}
      JWT_SECRET: ${JWT_SECRET:-replace-this-with-a-long-production-secret}
    ports: ["8080:8080"]
    depends_on: [mysql,milvus]
  frontend:
    build: ./frontend
    ports: ["80:80"]
    depends_on: [backend]
volumes: {mysql-data: {}, etcd-data: {}, minio-data: {}, milvus-data: {}}
