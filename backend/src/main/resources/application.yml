spring:
  application.name: knova
  profiles:
    default: dev
  sql.init:
    mode: always
    schema-locations: classpath:schema.sql
  servlet.multipart:
    max-file-size: 30MB
    max-request-size: 30MB
server.port: ${SERVER_PORT:8080}
logging:
  file.path: ${LOG_PATH:./logs}
app:
  jwt-secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-bytes}
  ai:
    chat:
      api-key: ${DEEPSEEK_API_KEY:KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_CHAT_MODEL:deepseek-v4-pro}
    embedding:
      api-key: ${EMBEDDING_API_KEY:ollama}
      base-url: ${EMBEDDING_BASE_URL:http://localhost:11434/v1}
      model: ${AI_EMBEDDING_MODEL:bge-m3}
      dimension: ${AI_EMBEDDING_DIMENSION:1024}
management.endpoints.web.exposure.include: health,info
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
